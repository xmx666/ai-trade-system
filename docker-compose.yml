services:
  # Backend service (API and core logic)
  nofx:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
      args:
        - HTTP_PROXY=${HTTP_PROXY:-http://172.27.128.1:7890}
        - HTTPS_PROXY=${HTTPS_PROXY:-http://172.27.128.1:7890}
        - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,docker.io,registry-1.docker.io}
    container_name: nofx-trading
    restart: unless-stopped
    ports:
      - "${NOFX_BACKEND_PORT:-1666}:8080"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./config.db:/app/config.db
      - ./decision_logs:/app/decision_logs
      - ./prompts:/app/prompts
      - ./predictor_cache:/app/predictor_cache  # Kronos预测结果缓存目录
      - /etc/localtime:/etc/localtime:ro  # Sync host time
    environment:
      - TZ=${NOFX_TIMEZONE:-Asia/Shanghai}  # Set timezone
      #代理配置（如果使用VPN代理，取消下面的注释并设置代理地址）
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=localhost,127.0.0.1,nofx,nofx-frontend,172.21.0.0/16
    # GPU支持（需要nvidia-docker或Docker的GPU支持）
    # 如果使用Docker Desktop，可能需要使用runtime: nvidia
    # 如果使用nvidia-docker2，使用deploy配置
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - nofx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend service (static serving and proxy)
  nofx-frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
      args:
        - HTTP_PROXY=${HTTP_PROXY:-http://172.27.128.1:7890}
        - HTTPS_PROXY=${HTTPS_PROXY:-http://172.27.128.1:7890}
        - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,docker.io,registry-1.docker.io}
    container_name: nofx-frontend
    restart: unless-stopped
    ports:
      - "${NOFX_FRONTEND_PORT:-3001}:80"
    networks:
      - nofx-network
    depends_on:
      - nofx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  nofx-network:
    driver: bridge